title: "Practical AI for Scientists - FutureHouse Tutorial"
author: FutureHouse
copyright: "2026 FutureHouse"

execute:
  execute_notebooks: "off"

launch_buttons:
  notebook_interface: "jupyterlab"
  colab_url: "https://colab.research.google.com"
  thebe: true
  binderhub_url: "https://mybinder.org"

bibtex_bibfiles:
  - references.bib
sphinx:
  extra_extensions:
    - sphinxcontrib.bibtex
    - sphinx_thebe
  config:
    numfig: false
    html_theme_options:
      num_figure_captions: false


html:
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: false
  favicon: figures/FutureHouse-Logo.png
  extra_css:
    - _static/custom.css

repository:
  url: "https://github.com/Future-House/tutorial-series"
  branch: main
  path_to_book: "."

exclude_patterns:
  - .github/**
  - "**/.github/**"
  - .venv/**
  - "**/.venv/**"
  - _build/**
  - .git/**
  - references.bib
  - "*.yml"
  - "*.yaml"