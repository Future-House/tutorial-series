title: "Practical AI for Scientists - FutureHouse Tutorial"
author: FutureHouse
copyright: "2026 FutureHouse"

execute:
  execute_notebooks: "off"

bibtex_bibfiles:
  - references.bib

repository:
  url: "https://github.com/Future-House/tutorial-series"
  branch: main
  path_to_book: "."

sphinx:
  extra_extensions:
    - sphinxcontrib.bibtex
    - sphinx_thebe
  config:
    numfig: false
    thebe_config:
      repository_url: "https://github.com/Future-House/tutorial-series"
      repository_branch: "main"
      path_to_book: "."

    html_theme_options:
      use_issues_button: true
      use_repository_button: true
      repository_url: "https://github.com/Future-House/tutorial-series"
      repository_branch: "main"
      path_to_book: "."                                                 
      launch_buttons:
        thebe: true
        colab_url: "https://colab.research.google.com"
        binderhub_url: "https://mybinder.org"
        notebook_interface: "jupyterlab"

html:
  use_edit_page_button: false
  favicon: figures/FutureHouse-Logo.png
  extra_css:
    - _static/custom.css

exclude_patterns:
  - .github/**
  - "**/.github/**"
  - .venv/**
  - "**/.venv/**"
  - _build/**
  - .git/**
  - references.bib
  