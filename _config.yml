title: AI for Scientists - FutureHouse tutorial
copyright: "2026 FutureHouse"

# ──────────────────────────────────────────────
# Execution settings
# "off" means notebooks are NOT re-run during build.
# This is safest for tutorials that call external APIs (like Anthropic).
# Pre-run your notebooks and save the outputs before pushing.
#──────────────────────────────────────────────
execute:
  execute_notebooks   : "off"

launch_buttons:
  notebook_interface: "jupyterlab"
  colab_url: "https://colab.research.google.com"
  binderhub_url: ""   
  edit_url: null

bibtex_bibfiles: 
  - references.bib
  
html:
  use_repository_button: true 
  use_issues_button: true
  use_edit_page_button: false
  extra_css:
    - custom.css

repository:
  url                 : "https://github.com/Future-House/tutorial-series"
  branch              : main
  path_to_book        : "."

exclude_patterns:
  - .github/**
  - "**/.github/**"