name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches:
      - main          
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages    : write
      id-token : write
      contents : read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install jupyter-book sphinx-copybutton

      - name: Build the book
        run: |
          jupyter-book build . -v 2>&1 | tee build.log
          if [ ! -d "_build/html" ]; then
            echo "❌ Build failed — _build/html was not created"
            cat build.log
            exit 1
          fi


      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_build/html"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4