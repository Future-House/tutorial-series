name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches:
      - main         
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages    : write
      id-token : write
      contents : read

    steps:
      # 1. Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip            
      # 3. Install Jupyter Book and dependencies
      - name: Install dependencies
        run: |
          pip install mystmd jupyter-book

      # 4. Build the book
      #    Output goes to _build/html/
      - name: Build the book
        env:
          BASE_URL: "/tutorial-series"
        run: |
          myst build --html 2>&1 | tee build.log
          if [ ! -d "_build/html" ]; then
            echo "❌ Build failed — _build/html was not created"
            cat build.log
            exit 1
          fi

      # 5. Upload the built site as a GitHub Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_build/html"

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4